<ion-content [fullscreen]="true" class="info-content">
  <div class="info-bg" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <div class="nf-wrap">
    <div class="nf-badge">
      <ion-icon name="cafe-outline"></ion-icon>
    </div>
    <p class="nf-code">404</p>
    <h1 class="nf-title">Lost in the café</h1>
    <p class="nf-text">We couldn't find that page — but the coffee's still warm.</p>
    <a class="info-btn nf-btn" routerLink="/tabs/menu">
      Back to the menu
      <ion-icon name="arrow-forward-outline"></ion-icon>
    </a>
  </div>
</ion-content>
