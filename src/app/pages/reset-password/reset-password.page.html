<ion-content [fullscreen]="true" class="auth-content">
  <div class="auth-bg" aria-hidden="true"></div>
  <app-brand-dust></app-brand-dust>
  <div class="grain" aria-hidden="true"></div>

  <div class="auth-inner">
    <a class="auth-back" routerLink="/login">
      <ion-icon name="chevron-back-outline"></ion-icon>
      Sign in
    </a>

    <!-- Request form -->
    <ng-container *ngIf="!sent">
      <header class="brand">
        <div class="brand-mark">
          <ion-icon name="cafe-outline"></ion-icon>
        </div>
        <p class="signed">Est. with love</p>
        <p class="brand-eyebrow">Forever &amp; Rose</p>
        <h1 class="brand-title">Reset password</h1>
        <p class="brand-sub">We'll email you a reset link</p>
      </header>

      <form (ngSubmit)="sendReset()" class="auth-form">
        <div class="field" [class.has-error]="emailError">
          <span class="field-ico"><ion-icon name="mail-outline"></ion-icon></span>
          <ion-input
            label="Email"
            label-placement="stacked"
            type="email"
            autocomplete="email"
            [(ngModel)]="email"
            name="email"
            (ionInput)="emailError = false"
          ></ion-input>
        </div>
        <p class="field-error" *ngIf="emailError">Enter a valid email address</p>

        <button type="submit" class="submit-btn" appBloom [disabled]="sending">
          {{ sending ? 'Sending…' : 'Send reset link' }}
          <ion-icon name="paper-plane-outline" *ngIf="!sending"></ion-icon>
        </button>
      </form>

      <p class="auth-switch">
        Remembered it?
        <a routerLink="/login">Sign in</a>
      </p>
    </ng-container>

    <!-- Success confirmation -->
    <div class="success-panel" *ngIf="sent">
      <div class="success-icon">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
      </div>
      <h2 class="success-title">Check your inbox</h2>
      <p class="success-text">
        If an account exists for <strong>{{ email }}</strong>, a reset link is on its way.
      </p>
      <a class="submit-btn" appBloom routerLink="/login">Back to sign in</a>
      <p class="auth-switch">
        Wrong email?
        <a (click)="tryAgain()">Try again</a>
      </p>
    </div>
  </div>
</ion-content>
