<ion-header [translucent]="true" class="admin-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin-dashboard" text=""></ion-back-button>
    </ion-buttons>
    <button type="button" class="header-action" (click)="addNew()" aria-label="Add item">
      <ion-icon name="add-outline"></ion-icon>
    </button>
    <div class="cover">
      <p class="cover-eyebrow">The Carte</p>
      <h1 class="cover-title">Menu Items</h1>
      <p class="cover-sub">Dishes on the carte</p>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="admin-content">
  <app-crud-list entity="items"></app-crud-list>
</ion-content>
