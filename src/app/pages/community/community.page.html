<ion-header [translucent]="true" class="info-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/me" text=""></ion-back-button>
    </ion-buttons>
    <div class="cover">
      <p class="cover-eyebrow">Forever &amp; Rose</p>
      <h1 class="cover-title">Community</h1>
      <p class="cover-sub">Latest from the café</p>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="info-content">
  <div class="info-bg" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <div class="info-inner">
    <div class="diamond-rule" aria-hidden="true"><span>&#9670;</span></div>
    <div class="feed">
      <article class="feed-card" *ngFor="let post of posts">
        <div class="feed-avatar">{{ initials(post.author) }}</div>
        <div class="feed-body">
          <div class="feed-top">
            <h2 class="feed-author">{{ post.author }}</h2>
            <span class="feed-time">{{ post.time }}</span>
          </div>
          <p class="feed-text">{{ post.text }}</p>
        </div>
      </article>
    </div>
  </div>
</ion-content>
